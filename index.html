<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skycast — Weather</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="container">
    <header>
      <h1 class="logo">SKYCAST</h1>
      <p class="tagline">Real-time weather, beautifully delivered</p>
    </header>

    <section class="search-section">
      <form id="weather-form">
        <div class="input-group">
          <input
            type="text"
            id="location-input"
            placeholder="Enter city name…"
            autocomplete="off"
            required
          />
          <button type="submit" id="search-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
      </form>

      <div class="unit-toggle">
        <button class="unit-btn active" data-unit="metric">°C</button>
        <span>/</span>
        <button class="unit-btn" data-unit="imperial">°F</button>
      </div>
    </section>

    <!-- Loading -->
    <div id="loader" class="loader hidden">
      <div class="spinner"></div>
      <p>Fetching weather data…</p>
    </div>

    <!-- Error -->
    <div id="error-box" class="error-box hidden">
      <span>⚠</span>
      <p id="error-msg">Something went wrong.</p>
    </div>

    <!-- Weather Card -->
    <div id="weather-card" class="weather-card hidden">
      <div class="card-top">
        <div class="location-info">
          <h2 id="city-name">—</h2>
          <p id="country-name">—</p>
          <p id="local-time" class="local-time">—</p>
        </div>
        <div class="weather-icon-wrap">
          <div id="weather-icon" class="weather-icon">☀️</div>
          <p id="weather-desc" class="weather-desc">—</p>
        </div>
      </div>

      <div class="temp-display">
        <span id="temperature">—</span>
        <span class="temp-unit" id="temp-unit">°C</span>
      </div>

      <p id="feels-like" class="feels-like">Feels like —</p>

      <div class="stats-grid">
        <div class="stat">
          <span class="stat-icon">💧</span>
          <span class="stat-label">Humidity</span>
          <span class="stat-value" id="humidity">—</span>
        </div>
        <div class="stat">
          <span class="stat-icon">💨</span>
          <span class="stat-label">Wind</span>
          <span class="stat-value" id="wind-speed">—</span>
        </div>
        <div class="stat">
          <span class="stat-icon">👁️</span>
          <span class="stat-label">Visibility</span>
          <span class="stat-value" id="visibility">—</span>
        </div>
        <div class="stat">
          <span class="stat-icon">🌡️</span>
          <span class="stat-label">Pressure</span>
          <span class="stat-value" id="pressure">—</span>
        </div>
        <div class="stat">
          <span class="stat-icon">🌅</span>
          <span class="stat-label">Sunrise</span>
          <span class="stat-value" id="sunrise">—</span>
        </div>
        <div class="stat">
          <span class="stat-icon">🌇</span>
          <span class="stat-label">Sunset</span>
          <span class="stat-value" id="sunset">—</span>
        </div>
      </div>
    </div>

    <p class="credit">Powered by OpenWeatherMap</p>
  </main>

  <script src="weather.js"></script>
</body>
</html>
